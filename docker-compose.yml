services:

  postgres:
    image: postgres:16-alpine
    container_name: workflow-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: workflow
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
