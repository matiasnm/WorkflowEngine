spring:
  application:
    name: workflow-engine

  profiles:
    group:
      dev-jpa:
        - dev
        - jpa

      dev-pg:
        - dev
        - pg

      dev-memory:
        - dev
        - memory

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    prometheus:
      enabled: true