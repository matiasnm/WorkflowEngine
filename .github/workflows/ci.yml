name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workflow
          POSTGRES_PASSWORD: workflow
          POSTGRES_DB: workflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
      - name: Backend tests
        run: ./gradlew test
        working-directory: ./backend
        env:
          SPRING_PROFILES_ACTIVE: dev-h2
      - name: Backend build
        run: ./gradlew bootJar
        working-directory: ./backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend
      - name: Frontend tests
        run: npx ng test --watch=false --browsers=ChromeHeadless
        working-directory: ./frontend
      - name: Frontend build
        run: npx ng build
        working-directory: ./frontend
